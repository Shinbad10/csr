name: Deploy Docker Image to GitHub (GHCR)

on:
  push:
    branches:
      - main

# Cấp quyền "Ghi" để Github tạo file Image vào kho nội bộ
permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout mã nguồn
        uses: actions/checkout@v4

      # Tên image docker bắt buộc phải là chữ thường, bước này tự động chuyển đổi
      - name: 🔠 Định dạng tên Repository
        run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: 🐳 Thiết lập công cụ Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Phép màu ảo diệu: GHCR dùng luôn token nội bộ của nhánh, BẠN KHÔNG CẦN TẠO SECRET thủ công nữa!
      - name: 🔑 Đăng nhập GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Xây dựng và Nén Image Lên GitHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Ví dụ nó sẽ đẩy lên: ghcr.io/shinbad10/csr:latest
          tags: ghcr.io/${{ env.REPO_NAME }}:latest
          # Giữ lại cache siêu tốc cho các lần build sau
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_NAME }}:buildcache,mode=max
